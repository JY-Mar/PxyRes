# AUTHOR          : JY-Mar
# REPO            : https://github.com/JY-Mar/PxyRes
# UPDATED         : 2026-06-25 11:01:23 GMT+8

# MARK: General
# HTTP(S) and SOCKS5 共用端口
mixed-port: 7890
# HTTP 代理端口
port: 7891
# SOCKS5 代理端口
socks-port: 7892
# Linux 和 macOS 的 redir 透明代理端口 (重定向 TCP 和 TProxy UDP 流量)
redir-port: 7893
# Linux 的透明代理端口（适用于 TProxy TCP 和 TProxy UDP 流量)
tproxy-port: 7894
# 运行模式
# > 允许的值：
# > - rule: 规则匹配
# > - global: 全局代理
# > - direct: 全局直连
mode: rule
# UDP 支持
udp: true
# 日志级别
# > 允许的值：
# > - warning: 输出发生错误但不影响运行的日志,以及error级别内容
# > - debug: 尽可能的输出运行中所有的信息
# > - info: 输出一般运行的内容，以及error和warning级别的日志
# > - error: 仅输出发生错误至无法使用的日志
# > - silent: 静默,不输出log-level: warning
log-level: warning
# 是否允许内核接受 IPv6 流量
ipv6: true
# 允许局域网
# > 允许其他设备经过内核的代理端口访问互联网
allow-lan: false
# 更换延迟计算方式
# > 去除握手等额外延迟
unified-delay: true
# 进程匹配模式
# > 允许的值：
# > - strict: 由内核判断是否开启
# > - always: 强制匹配所有进程
# > - off: 不匹配进程,推荐在路由器上使用此模式
find-process-mode: strict
# TCP并发
# > 当域名解析出多个 IP 时，并发向所有 IP 发起 TCP 连接，并使用最快握手的连接
tcp-concurrent: false
tcp-keep-alive-interval: 30
# GeoIP 使用 Country.mmdb
geodata-mode: false
# Geo文件加载器
# > 允许的值：
# > - standard: 标准加载器
# > - memconservative: 专为内存受限(小内存)设备优化的加载器
# > - memc: memconservative的别名
geodata-loader: memconservative
# GEO 数据文件自动更新
geo-auto-update: true
# Geo自动更新间隔
# > 单位:h
geo-update-interval: 168
# geox-url配置
geox-url:
  # 自定义geoip数据库的下载地址
  # geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # 域名与分类的映射（如广告、社交媒体等）
  # geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  # mmdb文件下载地址
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  # asn文件下载地址
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
# 外部控制器(HTTP)监听地址
# > ipv4:端口
external-controller: 0.0.0.0:9090
# 外部控制器RESTful API访问密钥
# > 请求头Authorization:Bearer <secret>
# secret: '9527'
# 外部用户界面路径(默认:工作目录/ui)
# > 可以将静态网页资源运行在RESTful API(可以为绝对路径,或者内核工作目录的相对路径)
# external-ui: ui
# external-ui-url: 'https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip'

# MARK: Profile
profile:
  # 持久化策略组的选择
  # > 缓存对策略组的选择,以供下次启动时使用
  store-selected: true
  # 持久化缓存fake-ip映射表
  # > 缓存fake-ip映射表,域名再次发生连接时,使用原有映射地址
  store-fake-ip: true

# MARK: Sniffer
sniffer:
  # 是否启用嗅探器
  # 开启后对 redir-host 类型识别的流量进行强制嗅探
  # 包含 Tun、Redir 和 TProxy 或 DNS 为 redir-host
  # 全端口嗅探会解析所有 HTTP/TLS/QUIC 流量，内存占用高
  enable: true
  # 启用redir-host强制嗅探
  # > 对redir-host类型识别的流量进行强制嗅探
  force-dns-mapping: true
  # 启用未获取到域名强制嗅探
  # > 对所有未获取到域名的流量进行强制嗅探
  parse-pure-ip: true
  # 启用嗅探结果作为实际访问
  # > 全局配置,优先级低于sniffer.sniff中的配置
  override-destination: true
  sniff:
    # HTTP 嗅探端口范围
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # TLS 嗅探端口
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 强制嗅探的域名白名单
  force-domain: ['+.v2ex.com']
  # 跳过嗅探的域名黑名单
  skip-domain: ['Mijia Cloud']

# MARK: Dns
# 可选；若不配置，程序内置的 DNS 服务会被关闭
dns:
  # 启用DNS
  # > 关闭将使用系统DNS
  enable: true
  # DNS服务器监听地址
  # > ipv4:端口
  listen: 0.0.0.0:1053
  # 启用配置中的hosts配置
  use-hosts: true
  # 查询系统hosts文件
  # > 优先级低于配置中的hosts配置
  use-system-hosts: true
  # 是否解析IPV6
  # > 如为false,则回应内容为AAAA的空解析
  ipv6: true
  # DNS请求遵循规则路由
  # > 需配置 `proxy-server-nameserver`
  respect-rules: false
  # 启用DoH的HTTP/3支持
  prefer-h3: true
  # fake-ip 或 redir-host
  enhanced-mode: fake-ip
  # Fake IP 地址池 (CIDR 形式)
  fake-ip-range: 198.18.0.1/16
  # Fake IP 过滤模式：blacklist（黑名单）/ whitelist（白名单）/ rule（规则）
  fake-ip-filter-mode: blacklist
  # 在以下列表的域名将不会被解析为 fake ip，这些域名相关的解析请求将会返回它们真实的 IP 地址
  fake-ip-filter: ['*', +.lan, localhost, '*.local', +.stun.*, e.crashlynatics.com]
  # 元域名解析服务器
  # > 解析nameserver,fallback以及其他DNS服务器配置的DNS服务器(只能使用纯IP地址,支持 `UDP`,`TCP`,`DoT`,`DoH`,`DoQ`)
  default-nameserver: [119.29.29.29, 223.5.5.5, 223.6.6.6, 8.8.8.8, 114.114.114.114]
  # 默认域名解析服务器
  # > 支持 `UDP`,`TCP`,`DoT`,`DoH`,`DoQ`
  nameserver: [https://223.5.5.5/dns-query, https://223.6.6.6/dns-query, https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  # 代理节点DNS解析服务器
  # > 用于解析代理节点的域名
  proxy-server-nameserver: [https://doh.pub/dns-query]
  # 备用域名解析服务器
  # > 一般情况下使用境外DNS服务器,保证结果可信
  fallback: [tls://8.8.4.4, tls://1.1.1.1]
  # 启用fallback-filter
  fallback-filter:
    geoip: true
    geoip-code: CN
    nameserver-policy: ['gfw']
    # DNS污染网段列表
    # > 这些网段的结果会被视为污染,将采用fallback的解析结果
    ipcidr: [240.0.0.0/4]
    # DNS污染域名列表
    # > 这些域名的结果会被视为污染,将采用fallback的解析结果
    domain: [+.google.com, +.facebook.com, +.youtube.com]

# MARK: Tun
tun:
  # 启用 TUN 模式
  enable: true
  # TUN模式堆栈
  # > 如无使用问题,建议使用mixed(默认gvisor)
  # > 允许的值：
  # > - system: 基于系统网络栈执行L3到L4转换。可以提供更稳定/全面的TUN体验,且占用相对其他堆栈更低。
  # > - gvisor: 基于gVisor虚拟网络栈执行L3到L4转换。通过在用户空间中实现网络协议栈,可以提供更高的安全性和隔离性,同时可以避免操作系统内核和用户空间之间的切换,从而在特定情况下具有更好的网络处理性能。
  # > - mixed: 混合堆栈,tcp使用system栈,udp使用gvisor栈,使用体验可能相对更好。
  stack: system
  # 自动设置全局路由
  # > 可以自动将全局流量路由进入TUN网卡
  auto-route: true
  # 自动选择流量出口接口
  # > 多出口网卡同时连接的设备建议手动指定出口网卡
  auto-detect-interface: true
  # DNS劫持
  # > 一般设置为any:53即可,即劫持所有53端口的udp流量
  dns-hijack: [any:53, tcp://any:53]
  # 启用auto-route时,指定这些网段不会被路由（使用默认路由）
  route-exclude-address: [10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 192.168.0.0/16, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32]

# MARK: Listeners
listeners:
  # P2P下载端口
  - { name: socks5-in-1, type: socks, port: 10808, listen: 0.0.0.0, udp: true, users: [], proxy: DIRECT }

# MARK: Mitm
# mitm:
