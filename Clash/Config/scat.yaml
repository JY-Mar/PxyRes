# NAME            : Config For Clash
# AUTHOR          : JY-Mar
# REPO            : https://github.com/JY-Mar/PxyRes
# UPDATED         : 2026-05-26 11:08:31 GMT+8

#region 主要端口设置
# HTTP 代理端口
port: 7890
# SOCKS5 代理端口
socks-port: 7891
# HTTP(S) and SOCKS5 共用端口
mixed-port: 7892
# Linux 和 macOS 的 redir 透明代理端口 (重定向 TCP 和 TProxy UDP 流量)
redir-port: 7893
# Linux 的透明代理端口（适用于 TProxy TCP 和 TProxy UDP 流量)
tproxy-port: 7894

# 统一延迟
unified-delay: true
# GeoIP 使用 Country.mmdb
geodata-mode: false
# GeoIP 加载模式：standard（懒加载） / mem（预加载）
geodata-loader: standard
# GEO 数据文件自动更新
geo-auto-update: true
# 每隔 N小时 自动检查并更新 GEO 数据文件
geo-update-interval: 168
geox-url:
  # IP 地址与国家/地区的映射
  geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  # 域名与分类的映射（如广告、社交媒体等）
  geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  # geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  # 更高精度的 IP 数据库
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  # GeoIP 数据的来源
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
# TCP 并发
tcp-concurrent: false
# 识别进程模式：off（关闭进程识别，不启用 PROCESS-NAME 规则。性能最佳，适合路由器等设备） / strict（严格模式，只有成功识别进程才应用 PROCESS-NAME 规则。失败则不匹配） / always（始终尝试识别进程，即使失败也会继续尝试匹配规则。可能影响性能）
# find-process-mode: strict

# 允许局域网的连接（可用来共享代理）
allow-lan: true
# 工作模式：rule（规则） / global（全局代理）/ direct（全局直连）
mode: rule
# 设置日志输出级别 (默认级别：silent，即不输出任何内容，以避免因日志内容过大而导致程序内存溢出）。
# 5 个级别：silent / info / warning / error / debug。级别越高日志输出量越大，越倾向于调试，若需要请自行开启。
log-level: warning
# IPv6 支持
ipv6: true
# UDP 支持
udp: true
# 外部控制器(HTTP)监听地址
external-controller: 0.0.0.0:17890
# 请求头Authorization:Bearer <secret>
secret: "9527"
# 外部用户界面路径(默认:工作目录/ui)
external-ui: dashboard

bind-address: '*'
#endregion

#region MITM 设置
# mitm:
#   enable: true
#   ca:
#     cert: ./mitm-ca.pem
#     key: ./mitm-ca-key.pem
#   port: 7892  # 必须与 mixed-port 一致，或单独指定
#endregion

#region 配置文件
profile:
  store-selected: true
  store-fake-ip: false
#endregion

#region 嗅探器
sniffer:
  # 是否启用嗅探器
  # 开启后对 redir-host 类型识别的流量进行强制嗅探
  # 包含 Tun、Redir 和 TProxy 或 DNS 为 redir-host
  # 全端口嗅探会解析所有 HTTP/TLS/QUIC 流量，内存占用高
  enable: false
  # 是否强制将 IP 映射为域名（即使已有域名）
  force-dns-mapping: false
  # 是否对纯 IP 流量进行嗅探
  # 风险：对纯 IP 流量进行嗅探会增加 CPU 开销。在 iOS 环境下，过高的资源占用可能导致网络扩展进程（Tunnel）被系统杀掉
  parse-pure-ip: false
  # 是否使用嗅探出的域名替代原始目标地址
  # 风险：强行将目标地址替换为嗅探出的域名。如果嗅探结果有误，或者该 App 使用了特殊的安全校验，会导致连接直接中断
  override-destination: false
  sniff:
    # HTTP 嗅探端口范围
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # TLS 嗅探端口
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 强制嗅探的域名白名单
  force-domain: []
  # 跳过嗅探的域名黑名单
  skip-domain: []
#endregion

#region TUN 模块
tun:
  # 如果需要启用 TUN 模式，请设置为 true
  enable: false
  # system 或 gvisor
  stack: system
  endpoint-independent-nat: false
  # 自动路由
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  # 清空 DNS 劫持，减少 Fake-IP 映射
  dns-hijack: []
#endregion

#region DNS 设置
# 可选；若不配置，程序内置的 DNS 服务会被关闭
dns:
  enable: true
  prefer-h3: false
  listen: 127.0.0.1:1053
  # 当此选项为 false 时, AAAA 请求将返回空
  ipv6: true
  # 查询 hosts 并返回 IP 记录
  use-hosts: true
  # 处理 DNS 请求时，是否强制先匹配 rules（规则）再决定解析策略
  respect-rules: false
  # 使用系统 hosts 文件
  use-system-hosts: false
  # fake-ip 或 redir-host
  enhanced-mode: fake-ip
  # Fake IP 地址池 (CIDR 形式)
  fake-ip-range: 198.18.0.1/16
  # 在以下列表的域名将不会被解析为 fake ip，这些域名相关的解析请求将会返回它们真实的 IP 地址
  fake-ip-filter: ["*", +.lan]
  # 以下填写的 DNS 服务器将会被用来解析 DNS 服务的域名
  # 仅填写 DNS 服务器的 IP 地址
  default-nameserver: [223.5.5.5, 223.6.6.6]
  # 支持 UDP / TCP / DoT / DoH 协议的 DNS 服务，可以指明具体的连接端口号。
  # 所有 DNS 请求将会直接发送到服务器，不经过任何代理。
  # Clash 会使用最先获得的解析记录回复 DNS 请求
  nameserver: [https://223.5.5.5/dns-query, https://223.6.6.6/dns-query]
  # proxy-server-nameserver: [223.5.5.5, 223.6.6.6]
  # 当 fallback 参数被配置时, DNS 请求将同时发送至上方 nameserver 列表和下方 fallback 列表中配置的所有 DNS 服务器.
  # 当解析得到的 IP 地址的地理位置不是 CN 时，clash 将会选用 fallback 中 DNS 服务器的解析结果。
  # fallback: []
  # 如果使用 nameserver 列表中的服务器解析的 IP 地址在下方列表中的子网中，则它们被认为是无效的，
  # Clash 会选用 fallback 列表中配置 DNS 服务器解析得到的结果。
  #
  # 当 fallback-filter.geoip 为 true 且 IP 地址的地理位置为 CN 时，
  # Clash 会选用 nameserver 列表中配置 DNS 服务器解析得到的结果。
  #
  # 当 fallback-filter.geoip 为 false, 如果解析结果不在 fallback-filter.ipcidr 范围内，
  # Clash 总会选用 nameserver 列表中配置 DNS 服务器解析得到的结果。
  #
  # 采取以上逻辑进行域名解析是为了对抗 DNS 投毒攻击。
  # fallback-filter:
  #   geoip: false
  #   geoip-code: CN
  #   ipcidr:
  #     - 0.0.0.0/32
  #     - 0.0.0.0/8
  #     - 10.0.0.0/8
  #     - 100.64.0.0/10
  #     - 127.0.0.0/8
  #     - 169.254.0.0/16
  #     - 172.16.0.0/12
  #     - 192.0.0.0/24
  #     - 192.0.2.0/24
  #     - 192.88.99.0/24
  #     - 192.168.0.0/16
  #     - 198.18.0.0/15
  #     - 198.51.100.0/24
  #     - 203.0.113.0/24
  #     - 224.0.0.0/4
  #     - 240.0.0.0/4
  #     - 255.255.255.255/32
  #   domain: []
#endregion

#region 锚点
Anchors:
  # [url-test | fallback | load-balance] 策略组自动择优测速地址 url
  proxy-test-url: &proxy-test-url 'https://cp.cloudflare.com/generate_204'
  # [url-test | fallback | load-balance] 策略组测速间隔（秒）
  proxy-test-interval: &proxy-test-interval 300
  # [url-test | fallback | load-balance] 策略组代理节点切换容差（毫秒）
  proxy-test-tolerance: &proxy-test-tolerance 50
  # [url-test | fallback | load-balance] 策略组测速超时（毫秒）（超出则判定为失败）
  test-timeout: &test-timeout 5000
  # [url-test | fallback | load-balance] 策略组测速失败次数（在 timeout 时间长度内,请求失败 max-failed-times 次,强制提前主动触发健康检查）
  switch-node-after-failure-times: &switch-node-after-failure-times 3
  # 订阅源更新间隔（秒）
  provider-update-interval: &provider-update-interval 86400
  # 订阅源健康检查间隔（秒）
  internet-test-interval: &internet-test-interval 600
  # 订阅源健康检查 url
  internet-test-url: &internet-test-url 'https://connectivitycheck.platform.hicloud.com/generate_204'
  # 自动测速策略组 [url-test 每 proxy-test-interval 秒一次惰性健康检查，容差 proxy-test-tolerance 毫秒，时延超过 test-timeout 毫秒判定为失败，失败 switch-node-after-failure-times 次则自动触发健康检查]
  # proxies 内节点将根据测速结果自动切换延迟最低的节点
  url-test:
    &url-test {
      type: url-test,
      url: *proxy-test-url,
      interval: *proxy-test-interval,
      tolerance: *proxy-test-tolerance,
      lazy: true,
      timeout: *test-timeout,
      max-failed-times: *switch-node-after-failure-times,
      include-all: false,
      hidden: true
    }
  # 故障转移策略组 [fallback 每 proxy-test-interval 秒一次惰性健康检查，容差 proxy-test-tolerance 毫秒，时延超过 test-timeout 毫秒判定为失败，失败 switch-node-after-failure-times 次则自动触发健康检查]
  # proxies 内节点将根据测速结果自动切换从上到下第一个连通的节点
  fallback:
    &fallback {
      <<: *url-test,
      type: fallback
    }
  # 负载均衡策略组 [load-balance 每 proxy-test-interval 秒一次惰性健康检查，容差 proxy-test-tolerance 毫秒，时延超过 test-timeout 毫秒判定为失败，失败 switch-node-after-failure-times 次则自动触发健康检查]
  # proxies 内节点将多个节点分摊流量
  load-balance:
    &load-balance {
      <<: *url-test,
      type: load-balance,
      strategy: sticky-sessions
    }
  # 规则集 [每 provider-update-interval 秒更新一次订阅规则]
  RuleProviders: &RuleProviders {
    type: http,
    behavior: classical,
    interval: *provider-update-interval
  }
  # 代理集 [每 provider-update-interval 秒更新一次订阅节点，每 internet-test-interval 秒一次健康检查]
  ProxyProviders: &ProxyProviders {
    type: http,
    interval: *provider-update-interval,
    health-check: {
      enable: true,
      url: *internet-test-url,
      interval: *internet-test-interval,
      lazy: true
    }
  }
  # 正则筛选（正则中避免出现中文、emoji，会不兼容）
  Filters:
    Filter_Nat_HK: &Filter_Nat_HK ^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_MO: &Filter_Nat_MO ^(?=.*((?i)🇲🇴|澳门|(\b(MO|MAC|Macau|Macao)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_TW: &Filter_Nat_TW ^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_CHN: &Filter_Nat_CHN ^(?=.*((?i)🇭🇰|香港|🇲🇴|澳门|🇹🇼|台湾|(\b(HK|HKG|Hong|MO|MAC|Macau|Macao|TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_JP: &Filter_Nat_JP ^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_KR: &Filter_Nat_KR ^(?=.*((?i)🇰🇷|韩国|韓|南朝鲜|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_SG: &Filter_Nat_SG ^(?=.*((?i)🇸🇬|新加坡|星洲|狮城|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_MY: &Filter_Nat_MY ^(?=.*((?i)🇲🇾|马来西亚|大马|马来|(\b(MY|Malaysia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_IN: &Filter_Nat_IN ^(?=.*((?i)🇮🇳|印度|新德里|印|(\b(IN|IND|India)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Reg_ASI: &Filter_Reg_ASI ^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|🇰🇷|韩国|韓|南朝鲜|首尔|🇸🇬|新加坡|星洲|狮城|狮|🇲🇾|马来西亚|大马|马来|🇮🇳|印度|新德里|印|(\b(JP|JPN|Japan|KR|KOR|Korea|SG|SGP|Singapore|MY|Malaysia|IN|IND|India)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_US: &Filter_Nat_US ^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_CA: &Filter_Nat_CA ^(?=.*((?i)🇨🇦|加拿大|多伦多|蒙特利尔|温哥华|(\b(CA|Canada)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Reg_NAM: &Filter_Reg_NAM ^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇨🇦|加拿大|多伦多|蒙特利尔|温哥华|(\b(US|USA|United States|CA|Canada)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_AU: &Filter_Nat_AU ^(?=.*((?i)🇦🇺|澳大利亚|澳洲|澳|悉尼|墨尔本|(\b(AU|Australia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Reg_OCE: &Filter_Reg_OCE ^(?=.*((?i)🇦🇺|澳大利亚|澳洲|澳|悉尼|墨尔本|(\b(AU|Australia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_UK: &Filter_Nat_UK ^(?=.*((?i)🇬🇧|英国|伦敦|英|(\b(GB|UK|United Kingdom|England|Britain)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_FR: &Filter_Nat_FR ^(?=.*((?i)🇫🇷|法国|法兰西|巴黎|法|(\b(FR|France)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_DE: &Filter_Nat_DE ^(?=.*((?i)🇩🇪|德国|德意志|柏林|德|(\b(DE|GER|Germany)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_IT: &Filter_Nat_IT ^(?=.*((?i)🇮🇹|意大利|罗马|意|(\b(IT|Italy)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_NL: &Filter_Nat_NL ^(?=.*((?i)🇳🇱|荷兰|阿姆斯特丹|鹿特丹|荷|(\b(NL|Holland|Netherlands|Nederland)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_LU: &Filter_Nat_LU ^(?=.*((?i)🇱🇺|卢森堡|(\b(LU|Luxembourg|Luxemburg)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Nat_LT: &Filter_Nat_LT ^(?=.*((?i)🇱🇹|立陶宛|(\b(LT|Lithuania)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Reg_EUR: &Filter_Reg_EUR ^(?=.*((?i)🇬🇧|英国|伦敦|英|🇫🇷|法国|法兰西|巴黎|法|🇩🇪|德国|德意志|柏林|德|🇮🇹|意大利|罗马|意|🇳🇱|荷兰|阿姆斯特丹|鹿特丹|荷|🇱🇺|卢森堡|🇱🇹|立陶宛|(\b(GB|UK|United Kingdom|England|Britain|FR|France|DE|GER|Germany|IT|Italy|NL|Holland|Netherlands|Nederland|LU|Luxembourg|Luxemburg|LT|Lithuania)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Game: &Filter_Game ^(?=.*((?i)游戏|蒸汽平台|(\b(GAME|Steam)(\d+)?\b)))(?!.*((?i)回国|校园)).*$
    Filter_Global: &Filter_Global ^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel)\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$
#endregion

#region 代理集
# proxy-providers:
#   [订阅名称]:
#     type: http
#     url: [你的订阅链接]
#     interval: 86400
