<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icons 图片展示</title>
    <style>
      :root {
        --font-size-lg: 1rem;
        --font-size: 0.875rem;
        --font-size-sm: 0.75rem;

        --icon-size-lg: 9rem;
        --icon-size: 6rem;
        --icon-size-sm: 4rem;
      }

      @media (prefers-color-scheme: light) {
        body {
          background-color: #f9f9f9;
          color: #000000;
        }
        .tree-body > .leaf-node > .leaf-main {
          box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .tree-body > .leaf-node > .leaf-main:hover {
          background-color: #ffffff !important;
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #222222;
          color: #ffffff;
        }
        .tree-body > .leaf-node > .leaf-main {
          box-shadow: 0 0 0 1px rgba(88, 88, 88, 0.3);
        }
        .tree-body > .leaf-node > .leaf-main:hover {
          background-color: #333333 !important;
        }
      }
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .top-filter {
        text-align: right;
        margin-bottom: 20px;
      }
      .top-filter .filter-btn {
        border-radius: 6px;
        height: 32px;
        width: 48px;
        cursor: pointer;
        display: inline-block;
        background-color: #1677ff;
        color: #ffffff;
        text-align: center;
        line-height: 32px;
        user-select: none;
      }
      .top-filter .filter-btn:hover {
        background-color: color-mix(in srgb, #1677ff, #ffffff 15%);
      }
      .top-filter .filter-btn:active {
        background-color: color-mix(in srgb, #1677ff, #000000 7%);
      }
      .top-filter .filter-btn + .filter-btn {
        margin-left: 0px;
        margin-right: 0px;
      }
      h1 {
        text-align: center;
      }
      h2 {
        margin-top: 2rem;
        text-align: left;
      }
      .tree-body {
        display: grid;
      }
      .tree-body > .tree-node {
        grid-column: 1 / -1;
      }
      .tree-body:has(.leaf-node > .leaf-main.large) {
        grid-template-columns: repeat(auto-fit, var(--icon-size-lg));
        gap: 1.7rem 1.4rem;
      }
      .tree-body:has(.leaf-node > .leaf-main.medium) {
        grid-template-columns: repeat(auto-fit, var(--icon-size));
        gap: 1.5rem 1.2rem;
      }
      .tree-body:has(.leaf-node > .leaf-main.small) {
        grid-template-columns: repeat(auto-fit, var(--icon-size-sm));
        gap: 1.3rem 1rem;
      }
      .tree-body > .leaf-node {
        will-change: scale, width, height;
        transition:
          scale 0.25s ease,
          width 0.25s ease,
          height 0.25s ease;
      }
      .tree-body > .leaf-node:has(.leaf-main.large) {
        width: var(--icon-size-lg);
      }
      .tree-body > .leaf-node:has(.leaf-main.medium) {
        width: var(--icon-size);
      }
      .tree-body > .leaf-node:has(.leaf-main.small) {
        width: var(--icon-size-sm);
      }
      .tree-body > .leaf-node:has(.leaf-main:hover) {
        scale: 1.2;
        z-index: 2;
        width: unset !important;
        height: unset !important;
      }
      .tree-body > .leaf-node {
        position: relative;
      }
      .tree-body > .leaf-node > .leaf-main {
        border-radius: 6px;
        cursor: pointer;
        will-change: background-color;
        transition: background-color 0.25s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: transparent;
      }
      .tree-body > .leaf-node > .leaf-main:hover + .leaf-footer {
        position: absolute;
        background-color: #666666;
      }
      .tree-body > .leaf-node > .leaf-main:hover.large + .leaf-footer,
      .tree-body > .leaf-node > .leaf-main:hover.medium + .leaf-footer,
      .tree-body > .leaf-node > .leaf-main:hover.small + .leaf-footer {
        left: 0;
        bottom: 1px;
      }
      .tree-body > .leaf-node > .leaf-main > .img-wrap {
        padding: 10px;
      }
      .tree-body > .leaf-node > .leaf-main > .img-wrap > img {
        object-fit: contain;
        width: 100%;
        height: 100%;
      }
      .tree-body > .leaf-node > .leaf-main.large,
      .tree-body > .leaf-node > .leaf-main.medium,
      .tree-body > .leaf-node > .leaf-main.small {
        width: inherit;
      }
      .tree-body > .leaf-node > .leaf-main.large {
        height: var(--icon-size-lg);
      }
      .tree-body > .leaf-node > .leaf-main.medium {
        height: var(--icon-size);
      }
      .tree-body > .leaf-node > .leaf-main.small {
        height: var(--icon-size-sm);
      }
      .tree-body > .leaf-node > .leaf-main:hover.large,
      .tree-body > .leaf-node > .leaf-main:hover.medium,
      .tree-body > .leaf-node > .leaf-main:hover.small {
        height: inherit !important;
      }
      .tree-body > .leaf-node > .leaf-footer {
        width: 100%;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        will-change: bottom, font-size, background-color;
        transition:
          bottom 0.25s ease,
          font-size 0.25s ease,
          background-color 0.25s ease;
        border-bottom-left-radius: 6px;
        border-bottom-right-radius: 6px;
      }
      .tree-body > .leaf-node:has(.leaf-main.large) > .leaf-footer {
        font-size: var(--font-size-lg);
      }
      .tree-body > .leaf-node:has(.leaf-main.medium) > .leaf-footer {
        font-size: var(--font-size);
      }
      .tree-body > .leaf-node:has(.leaf-main.small) > .leaf-footer {
        font-size: var(--font-size-sm);
      }
    </style>
    <script>
      function setSize(size) {
        document.querySelectorAll('.leaf-main').forEach((item) => {
          item.classList.remove('large', 'medium', 'small')
          item.classList.add(size)
        })
      }
    </script>
  </head>
  <body>
    <h1>Icons 图片展示</h1>
    <div class="top-filter">
      <label>图标大小：</label>
      <div class="filter-btn" onclick="setSize('large')">大</div>
      <div class="filter-btn" onclick="setSize('medium')">中</div>
      <div class="filter-btn" onclick="setSize('small')">小</div>
    </div>
    <div id="icon-container"></div>
    <script>
      const iconContainer = document.getElementById('icon-container')
      if (iconContainer) {
        const renderDataNode = (jsonObj, pElement) => {
          if (!!jsonObj && typeof jsonObj === 'object' && Object.prototype.toString.call(jsonObj) === '[object Object]') {
            const entries = Object.entries(jsonObj || {})
            const leafs = entries.filter((v) => typeof v[1] === 'string' && !!v[1])
            const nodes = entries.filter((v) => typeof v[1] === 'object' && Object.prototype.toString.call(v[1]) === '[object Object]')
            // 图片优先
            ;[...leafs, ...nodes].forEach(([key, value]) => {
              if (key === '_depth') {
                return
              }
              if (typeof value === 'string' && !!value) {
                // 叶子节点
                const leafNode = document.createElement('div')
                leafNode.classList.add('leaf-node')

                const imgName = key
                const imgPath = value

                const leafMain = document.createElement('div')
                leafMain.classList.add('leaf-main', 'medium')
                leafMain.title = imgName

                const imgWrap = document.createElement('div')
                imgWrap.classList.add('img-wrap')

                const img = document.createElement('img')
                img.src = imgPath
                img.alt = imgName

                const tip = document.createElement('div')
                tip.classList.add('leaf-footer')
                tip.innerHTML = imgName

                imgWrap.appendChild(img)
                leafMain.appendChild(imgWrap)
                leafNode.append(leafMain, tip)

                if (pElement) {
                  pElement.appendChild(leafNode)
                }
              } else if (typeof value === 'object' && Object.prototype.toString.call(value) === '[object Object]') {
                // 树节点
                const treeNode = document.createElement('div')
                treeNode.classList.add('tree-node')
                treeNode.setAttribute('style', `margin-left: ${value['_depth'] * 40}px`)
                // 分组标题
                const treeTitle = document.createElement('h2')
                treeTitle.classList.add('tree-title')
                treeTitle.innerHTML = key
                // 分组主体
                const treeBody = document.createElement('div')
                treeBody.classList.add('tree-body')

                renderDataNode(value, treeBody)

                if (pElement) {
                  treeNode.append(treeTitle, treeBody)
                  pElement.appendChild(treeNode)
                }
              }
            })
          }
        }

        fetch('./images.json')
          .then((res) => res.json())
          .then((data) => {
            if (typeof data === 'object' && Object.prototype.toString.call(data) === '[object Object]') {
              renderDataNode(data, iconContainer)
            }
          })
      }

      window.onload = () => {
        setSize('medium')
      }
    </script>
  </body>
</html>
